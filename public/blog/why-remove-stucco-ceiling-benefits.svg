<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Why remove a stucco ceiling benefits illustration</title>
  <desc id="desc">Illustration showing an older textured ceiling changing into a bright smooth ceiling with cleaner light, easier upkeep, and a more modern look.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="120" fill="#dbeafe" opacity="0.7"/>
  <circle cx="140" cy="620" r="150" fill="#e0f2fe" opacity="0.85"/>

  <text x="96" y="100" fill="#0f172a" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Why Homeowners Remove Stucco Ceilings
  </text>
  <text x="96" y="146" fill="#475569" font-size="24" font-family="Arial, Helvetica, sans-serif">
    Cleaner light, easier upkeep, smoother repairs, and a more modern room.
  </text>

  <g filter="url(#shadow)">
    <rect x="96" y="200" width="420" height="372" rx="28" fill="url(#panel)"/>
    <rect x="684" y="200" width="420" height="372" rx="28" fill="url(#panel)"/>
  </g>

  <text x="128" y="250" fill="#991b1b" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Before
  </text>
  <text x="716" y="250" fill="#065f46" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    After
  </text>

  <rect x="128" y="278" width="356" height="210" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="716" y="278" width="356" height="210" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>

  <rect x="146" y="302" width="320" height="30" rx="10" fill="#d6d3d1"/>
  <g fill="#a8a29e" opacity="0.95">
    <circle cx="176" cy="360" r="18"/>
    <circle cx="224" cy="382" r="22"/>
    <circle cx="278" cy="356" r="19"/>
    <circle cx="334" cy="386" r="23"/>
    <circle cx="392" cy="362" r="20"/>
    <circle cx="444" cy="388" r="18"/>
    <circle cx="202" cy="428" r="17"/>
    <circle cx="256" cy="450" r="21"/>
    <circle cx="320" cy="426" r="18"/>
    <circle cx="382" cy="452" r="22"/>
  </g>

  <rect x="734" y="302" width="320" height="30" rx="10" fill="#e2e8f0"/>
  <rect x="746" y="346" width="296" height="112" rx="14" fill="#ffffff"/>
  <circle cx="930" cy="402" r="62" fill="#fef3c7"/>
  <g stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <line x1="930" y1="318" x2="930" y2="342"/>
    <line x1="930" y1="462" x2="930" y2="486"/>
    <line x1="846" y1="402" x2="870" y2="402"/>
    <line x1="990" y1="402" x2="1014" y2="402"/>
    <line x1="872" y1="344" x2="890" y2="362"/>
    <line x1="970" y1="442" x2="988" y2="460"/>
    <line x1="872" y1="460" x2="890" y2="442"/>
    <line x1="970" y1="362" x2="988" y2="344"/>
  </g>

  <path d="M548 388h96" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round"/>
  <path d="M612 350l38 38-38 38" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="128" y="518" width="150" height="28" rx="14" fill="#fee2e2"/>
    <text x="144" y="538" fill="#991b1b" font-size="16" font-weight="700">Dated look</text>
    <rect x="294" y="518" width="150" height="28" rx="14" fill="#fee2e2"/>
