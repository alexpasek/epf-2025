<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">How to patch drywall guide</title>
  <desc id="desc">Illustration showing small drywall hole patching on one side and a larger drywall cut-out repair on the other.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="96" r="108" fill="#dbeafe" opacity="0.75"/>
  <circle cx="120" cy="620" r="120" fill="#cffafe" opacity="0.9"/>

  <text x="86" y="100" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">
    How to Patch Drywall
  </text>
  <text x="86" y="144" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">
    Small holes need one method. Larger damaged sections need another.
  </text>

  <g filter="url(#shadow)">
    <rect x="86" y="198" width="460" height="414" rx="28" fill="url(#card)"/>
    <rect x="654" y="198" width="460" height="414" rx="28" fill="url(#card)"/>
  </g>

  <text x="116" y="246" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Small hole patch
  </text>
  <text x="684" y="246" fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Larger section repair
  </text>

  <rect x="116" y="274" width="400" height="240" rx="20" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="160" y="330" width="312" height="128" rx="14" fill="#e2e8f0"/>
  <circle cx="316" cy="394" r="18" fill="#94a3b8"/>
  <circle cx="316" cy="394" r="9" fill="#475569"/>
  <path d="M236 520c40-28 118-28 160 0" fill="none" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
  <text x="142" y="572" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Fill, sand, check, and prime
  </text>

  <rect x="684" y="274" width="400" height="240" rx="20" fill="#f0fdfa" stroke="#99f6e4"/>
  <rect x="730" y="320" width="308" height="148" rx="12" fill="#ccfbf1"/>
  <rect x="812" y="346" width="144" height="96" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="6"/>
  <line x1="812" y1="346" x2="730" y2="320" stroke="#0f766e" stroke-width="6"/>
  <line x1="956" y1="346" x2="1038" y2="320" stroke="#0f766e" stroke-width="6"/>
  <line x1="812" y1="442" x2="730" y2="468" stroke="#0f766e" stroke-width="6"/>
  <line x1="956" y1="442" x2="1038" y2="468" stroke="#0f766e" stroke-width="6"/>
  <text x="724" y="572" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Backing, new board, tape, finish
  </text>

  <path d="M568 400h64" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round"/>
  <path d="M606 364l36 36-36 36" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="116" y="590" width="166" height="28" rx="14" fill="#dbeafe"/>
    <text x="134" y="609" fill="#1d4ed8" font-size="16" font-weight="700">Best for minor damage</text>
    <rect x="684" y="590" width="182" height="28" rx="14" fill="#ccfbf1"/>
    <text x="704" y="609" fill="#0f766e" font-size="16" font-weight="700">Best for larger openings</text>
  </g>
</svg>
