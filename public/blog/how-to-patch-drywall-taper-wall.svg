<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Drywall taper patching a wall</title>
  <desc id="desc">Illustration of a drywall taper applying compound over a wall patch with a wide knife to create a smooth paint-ready finish.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="110" fill="#bfdbfe" opacity="0.6"/>
  <circle cx="120" cy="620" r="130" fill="#ccfbf1" opacity="0.8"/>

  <text x="84" y="96" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">
    Drywall Taper Patching a Wall
  </text>
  <text x="84" y="140" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">
    Wide feathering, light coats, and a smooth paint-ready finish.
  </text>

  <g filter="url(#shadow)">
    <rect x="84" y="190" width="1032" height="440" rx="32" fill="#ffffff"/>
  </g>

  <rect x="124" y="228" width="500" height="364" rx="24" fill="url(#wall)" stroke="#cbd5e1"/>
  <rect x="224" y="318" width="300" height="180" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="4"/>
  <rect x="310" y="364" width="128" height="88" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="5"/>
  <path d="M262 410h210" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
  <path d="M248 432h236" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>
  <path d="M234 454h264" stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>

  <g transform="translate(700 238)">
    <circle cx="112" cy="72" r="40" fill="#f1c27d"/>
    <path d="M78 68c0-26 18-48 44-48 22 0 39 12 49 31-8-7-18-11-31-11-25 0-39 13-52 28z" fill="#334155"/>
    <rect x="82" y="114" width="70" height="112" rx="22" fill="#2563eb"/>
    <rect x="46" y="126" width="56" height="20" rx="10" fill="#2563eb"/>
    <rect x="150" y="128" width="94" height="22" rx="11" transform="rotate(-14 150 128)" fill="#f1c27d"/>
    <rect x="234" y="110" width="122" height="28" rx="10" transform="rotate(-14 234 110)" fill="#94a3b8"/>
    <rect x="344" y="94" width="54" height="62" rx="10" transform="rotate(-14 344 94)" fill="#e2e8f0" stroke="#64748b" stroke-width="4"/>
    <path d="M360 124c44 6 76 28 102 62" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <path d="M442 186c-62-12-110-6-150 16" fill="none" stroke="#cbd5e1" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="140" y="548" width="176" height="30" rx="15" fill="#dbeafe"/>
    <text x="162" y="568" fill="#1d4ed8" font-size="16" font-weight="700">Patch area widens out</text>
    <rect x="734" y="548" width="212" height="30" rx="15" fill="#ccfbf1"/>
    <text x="756" y="568" fill="#0f766e" font-size="16" font-weight="700">Thin coats, wide knife, smooth wall</text>
  </g>
</svg>
